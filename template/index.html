<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="%%ARTIST_NAME%% · %%ARTIST_TAGLINE%% · Electronic Press Kit oficial.">
<title>%%ARTIST_NAME%% — Electronic Press Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── NAWEMEDIA DJ EPK TOKENS — customize for each artist ─ */
:root{
  --bg:#07040e;--bg2:#0c0817;--bg3:#13102a;
  --pu:#c026d3;--pur:192,38,211;
  --pdim:rgba(192,38,211,.09);--pb:rgba(192,38,211,.28);
  --pu2:#7c3aed;--gold:#D4AF37;--gold-b:#F59E0B;
  --text:#f0e8ff;--muted:rgba(240,232,255,.58);
  --faint:rgba(240,232,255,.22);
  --line:rgba(240,232,255,.07);--line-s:rgba(240,232,255,.15);
  --d:'Anton',Impact,sans-serif;
  --h:'Oswald',sans-serif;
  --s:'Inter',system-ui,sans-serif;
  --m:'JetBrains Mono',ui-monospace,monospace;
  --max:1320px;--gap:clamp(1.25rem,4vw,3rem);
  --r:16px;--r2:22px;--r3:32px;
  --tr:.22s ease;
  --glow:0 0 40px rgba(192,38,211,.22),0 0 80px rgba(192,38,211,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--s);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.55;font-size:16px}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}
::selection{background:var(--pu);color:#fff}

/* AMBIENT + GRAIN */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 40rem at 80% -10%,rgba(192,38,211,.09),transparent 60%),
  radial-gradient(50rem 36rem at -10% 25%,rgba(124,58,237,.07),transparent 60%),
  radial-gradient(40rem 30rem at 50% 110%,rgba(192,38,211,.04),transparent 60%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>")}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .8s ease,visibility .8s ease}
#loader.out{opacity:0;visibility:hidden}
.ld-name{font-family:var(--d);font-size:clamp(30px,8vw,76px);text-transform:uppercase;display:flex;gap:.4ch;overflow:hidden;letter-spacing:.02em}
.ld-w{display:inline-block;transform:translateY(110%);animation:ldu .65s cubic-bezier(.16,1,.3,1) both}
.ld-w:nth-child(2){animation-delay:.12s}
.ld-sub{font-family:var(--m);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--pu);opacity:0;animation:ldf .5s .5s forwards}
.ld-bar{width:80px;height:1px;background:var(--line-s);border-radius:999px;overflow:hidden;opacity:0;animation:ldf .4s .3s forwards}
.ld-fill{height:100%;background:var(--pu);animation:lbf 1.3s ease forwards}
@keyframes ldu{to{transform:translateY(0)}}
@keyframes ldf{to{opacity:1}}
@keyframes lbf{from{width:0}to{width:100%}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 0;transition:.3s}
.nav.on{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(7,4,14,.88);border-bottom:1px solid var(--line)}
.nav-i{max-width:var(--max);margin:0 auto;padding:0 var(--gap);display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--d);font-size:13px;letter-spacing:.14em;text-transform:uppercase}
.nav-brand img{height:26px;filter:invert(1) brightness(1.1)}
.nav-links{display:flex;align-items:center;gap:22px}
.nav-links a{font-family:var(--m);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:4px 0;border-bottom:1px solid transparent;transition:.2s}
.nav-links a:hover{color:var(--text);border-bottom-color:var(--pu)}
.nav-cta{display:flex;align-items:center;gap:8px}
.nav-book{padding:8px 20px;border-radius:999px;background:var(--pu);color:#fff;font-family:var(--m);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:.2s;white-space:nowrap}
.nav-book:hover{background:var(--pu2);transform:translateY(-1px)}
.nav-adm{width:38px;height:38px;border-radius:50%;border:1px solid var(--line-s);background:rgba(255,255,255,.03);display:grid;place-items:center;font-size:14px;transition:.2s}
.nav-adm:hover{border-color:var(--pu);background:var(--pdim)}
.nav-mob{display:none;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);align-items:center;justify-content:center;flex-direction:column;gap:4px}
.nav-mob span{display:block;width:16px;height:1.5px;background:var(--text);border-radius:999px}

/* LAYOUT */
.w{width:min(calc(100% - 2*var(--gap)),var(--max));margin:0 auto}
.sec{position:relative;z-index:2;padding:clamp(4rem,9vw,7rem) 0}
.sec-dk{background:var(--bg2)}
.sec-hd{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;margin-bottom:clamp(2rem,4vw,3.2rem);border-bottom:1px solid var(--line);padding-bottom:1.4rem}
.sec-hd-l{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap}
.sec-num{font-family:var(--m);font-size:10px;letter-spacing:.22em;color:var(--pu);text-transform:uppercase}
.sec-label{font-family:var(--m);font-size:10px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
.sec-hd-r{font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);text-align:right;line-height:1.5}
.sec-title{font-family:var(--d);font-size:clamp(2.4rem,6.5vw,5rem);line-height:.88;letter-spacing:.01em;text-transform:uppercase;margin:1rem 0 0}
.sec-title em{font-style:italic;font-family:var(--h);font-weight:700;color:var(--pu);font-size:.78em}
.sec-title .strk{-webkit-text-stroke:1.5px var(--text);color:transparent}
.hdiv{height:1px;background:linear-gradient(to right,transparent,rgba(240,232,255,.06),transparent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;height:48px;padding:0 24px;border-radius:999px;font-family:var(--m);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--line-s);background:rgba(255,255,255,.04);transition:.2s ease;white-space:nowrap;cursor:pointer}
.btn:hover{border-color:var(--pu);background:var(--pdim);transform:translateY(-1px)}
.btn-pu{background:var(--pu);color:#fff;border-color:var(--pu);box-shadow:0 8px 28px rgba(var(--pur),.3)}
.btn-pu:hover{background:var(--pu2);border-color:var(--pu2);transform:translateY(-2px);box-shadow:0 14px 40px rgba(var(--pur),.4)}
.btn-sm{height:36px;padding:0 16px;font-size:10px}

/* HERO */
.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;overflow:hidden;z-index:2}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center 15%;animation:kb 14s ease-out both;filter:brightness(.35) contrast(1.2) saturate(.75)}
.hbg::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,rgba(7,4,14,.97) 0%,rgba(7,4,14,.6) 45%,rgba(7,4,14,.15) 100%),linear-gradient(to top,rgba(7,4,14,1) 0%,rgba(7,4,14,0) 52%);filter:none}
@keyframes kb{from{transform:scale(1.07)}to{transform:scale(1)}}
.hero-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:calc(80px + 4rem) var(--gap) 0}
.hero-grid{max-width:var(--max);margin:0 auto;width:100%;display:grid;grid-template-columns:1fr;gap:2.5rem;align-items:flex-end}
.hero-meta{display:flex;flex-direction:column;gap:1rem}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-family:var(--m);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--text);border:1px solid var(--line-s);border-radius:999px;padding:.4rem .85rem;width:fit-content;background:rgba(255,255,255,.03)}
.h-pulse{width:6px;height:6px;border-radius:50%;background:var(--pu);box-shadow:0 0 0 0 rgba(var(--pur),.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,38,211,.7)}70%{box-shadow:0 0 0 8px rgba(192,38,211,0)}100%{box-shadow:0 0 0 0 rgba(192,38,211,0)}}
.hero-name{font-family:var(--d);font-size:clamp(56px,13vw,148px);line-height:.82;letter-spacing:.01em;text-transform:uppercase}
.hero-name .ln2{-webkit-text-stroke:2px var(--text);color:transparent}
.hero-genres{display:flex;flex-wrap:wrap;gap:8px}
.gpill{padding:7px 14px;border-radius:999px;border:1px solid var(--line-s);background:rgba(255,255,255,.05);font-family:var(--m);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;backdrop-filter:blur(8px)}
.hero-cta{display:flex;flex-wrap:wrap;gap:10px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;max-width:380px;margin-top:.4rem}
.hstat{padding:.8rem 1rem;border:1px solid var(--line);background:rgba(255,255,255,.02);border-radius:14px}
.hstat-k{font-family:var(--d);font-size:1.7rem;letter-spacing:.01em;line-height:1}
.hstat-l{font-family:var(--m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:.35rem}

/* COUNTDOWN */
.hero-aside{display:flex;flex-direction:column;align-items:flex-end;gap:14px}
.cdcard{padding:20px;border-radius:24px;background:rgba(255,255,255,.07);border:1px solid var(--line-s);backdrop-filter:blur(20px);max-width:340px;margin-top:.2rem}
.cdlbl{font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--pu);margin-bottom:8px}
.cdevent{font-family:var(--d);font-size:1.05rem;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.cdmeta{font-family:var(--m);font-size:10px;color:var(--muted);margin-bottom:12px}
.cdnums{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cdu{text-align:center;padding:9px 4px;border-radius:10px;background:rgba(0,0,0,.32)}
.cdn{font-family:var(--d);font-size:1.5rem;letter-spacing:.01em;display:block;line-height:1}
.cdl{font-family:var(--m);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px;display:block}

/* MARQUEE */
.hero-mq{border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;height:58px;display:flex;align-items:center;background:rgba(255,255,255,.015);margin-top:2rem;position:relative;z-index:2}
.mq-track{display:flex;gap:2.5rem;white-space:nowrap;animation:mq 30s linear infinite;padding-left:2.5rem;font-family:var(--d);font-size:1.8rem;text-transform:uppercase;letter-spacing:.01em;line-height:1}
.mq-track span{display:inline-flex;align-items:center;gap:1rem}
.mq-dot{width:10px;height:10px;background:var(--pu);border-radius:50%;display:inline-block}
.mq-strk{-webkit-text-stroke:1.5px var(--text);color:transparent}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* BIO */
.bio-grid{display:grid;grid-template-columns:1fr 340px;gap:3.5rem;align-items:start}
.bio-langs{display:flex;gap:.35rem;margin-bottom:1.4rem}
.bio-lang{font-family:var(--m);font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:.5rem .8rem;border:1px solid var(--line-s);background:transparent;color:var(--muted);border-radius:0;transition:.2s;cursor:pointer}
.bio-lang:hover{color:var(--text);border-color:var(--text)}
.bio-lang.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.bio-lede{font-family:var(--h);font-size:clamp(1.1rem,2vw,1.6rem);font-weight:700;line-height:1.25;color:var(--text);margin:0 0 1.3rem;border-left:3px solid var(--pu);padding-left:1rem}
.bio-body{color:var(--muted);font-size:1rem;line-height:1.78}
.bio-body p{margin:0 0 .9rem}
.bio-body p:last-child{margin:0}
.bio-body strong{color:var(--text)}
.bio-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:1.8rem}
.bstat{padding:.85rem 1rem;border:1px solid var(--line);background:rgba(255,255,255,.02);border-radius:var(--r)}
.bstat-k{font-family:var(--d);font-size:1.4rem;letter-spacing:.01em;line-height:1}
.bstat-l{font-family:var(--m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:.3rem}
.bio-socials{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.4rem}
.soc-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1px solid var(--line-s);background:rgba(255,255,255,.03);font-family:var(--m);font-size:10px;letter-spacing:.12em;color:var(--muted);transition:.2s}
.soc-pill:hover{color:var(--text);border-color:var(--pu);background:var(--pdim)}
.bio-photo{position:relative;overflow:hidden;border:1px solid var(--line-s);aspect-ratio:3/4}
.bio-photo::after{content:'';position:absolute;inset:auto 0 0 0;height:50%;background:linear-gradient(to top,rgba(7,4,14,.8),transparent)}
.bio-photo-tag{position:absolute;left:0;bottom:0;background:var(--text);color:var(--bg);padding:.55rem .9rem;font-family:var(--m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;font-weight:700}

/* MUSIC */
.music-list{display:grid;gap:.75rem}
.track{border:1px solid var(--line);background:rgba(255,255,255,.02);border-radius:var(--r2);overflow:hidden;transition:.2s}
.track:hover{border-color:var(--pb);background:var(--pdim)}
.track-hd{display:flex;align-items:center;gap:1rem;padding:.9rem 1.2rem;border-bottom:1px solid var(--line)}
.track-num{font-family:var(--m);font-size:10px;letter-spacing:.18em;color:var(--muted);min-width:24px}
.track-title{font-family:var(--h);font-size:1rem;font-weight:700;text-transform:uppercase;flex:1;line-height:1.1}
.track-badge{font-family:var(--m);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;padding:.3rem .55rem;border-radius:3px;background:var(--pu);color:#fff}
.track-badge.rel{background:var(--gold-b);color:#000}
.track-player{padding:.75rem 1.2rem 1rem;background:rgba(0,0,0,.2)}
.track-player iframe{width:100%;height:130px;border:0;border-radius:8px;display:block}

/* SHOWS */
.show{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:1.5rem;padding:1.4rem 0;border-bottom:1px solid var(--line);transition:.2s}
.show:first-child{border-top:1px solid var(--line)}
.show:hover{padding-left:.5rem;background:rgba(192,38,211,.03)}
.show-date .d{display:block;font-family:var(--d);font-size:2.4rem;text-transform:uppercase;line-height:.85}
.show-date .m{display:block;font-family:var(--d);font-size:.95rem;color:var(--pu);letter-spacing:.04em;margin-top:.1rem}
.show-venue{font-family:var(--d);font-size:1.3rem;text-transform:uppercase;letter-spacing:.01em;line-height:1.05}
.show-city{font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:.25rem}
.show-type{font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:.3rem .6rem;border:1px solid var(--line-s);border-radius:3px;color:var(--muted);display:none}
@media(min-width:760px){.show-type{display:inline-block}}
.badge-up{padding:7px 14px;border-radius:999px;font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--pb);background:var(--pdim);color:var(--pu)}
.badge-so{padding:7px 14px;border-radius:999px;font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--line-s);background:rgba(255,255,255,.04);color:var(--muted)}
.no-shows{padding:2rem;border:1px dashed var(--line-s);border-radius:var(--r);text-align:center;color:var(--muted);font-family:var(--m);font-size:12px;letter-spacing:.1em}

/* GALLERY */
.g-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.2rem}
.gfbtn{padding:7px 16px;border-radius:999px;font-family:var(--m);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line-s);color:var(--muted);cursor:pointer;background:transparent;transition:.2s}
.gfbtn:hover,.gfbtn.on{background:var(--pu);border-color:var(--pu);color:#fff}
.gallery{display:grid;gap:.5rem;grid-template-columns:repeat(2,1fr);grid-auto-rows:180px}
@media(min-width:760px){.gallery{grid-template-columns:repeat(4,1fr);grid-auto-rows:220px}}
.gtile{position:relative;overflow:hidden;border:1px solid var(--line);background:var(--bg2);cursor:pointer}
.gtile div[style]{width:100%;height:100%;transition:transform .5s ease,filter .5s ease}
.gtile:hover div[style]{transform:scale(1.06);filter:saturate(1.25) brightness(1.06)}
.gtile::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(7,4,14,.8));pointer-events:none}
.gtile-cap{position:absolute;left:.75rem;bottom:.6rem;z-index:2;font-family:var(--m);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text)}
.gtile.wide{grid-column:span 2}
.gtile.tall{grid-row:span 2}
.gtile.feat{grid-column:span 2;grid-row:span 2}

/* PRESS KIT */
.pk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem}
.pkcard{display:block;padding:1.6rem 1.4rem;border:1px solid var(--line-s);background:rgba(255,255,255,.02);border-radius:var(--r2);transition:.22s ease;position:relative;overflow:hidden}
.pkcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pdim),transparent);opacity:0;transition:.22s}
.pkcard:hover{transform:translateY(-4px);border-color:var(--pb)}
.pkcard:hover::before{opacity:1}
.pkicon{font-size:1.8rem;display:block;margin-bottom:1rem;position:relative;z-index:1}
.pkname{font-family:var(--h);font-size:1.05rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem;position:relative;z-index:1}
.pkfmt{font-family:var(--m);font-size:10px;color:var(--muted);margin-bottom:.8rem;position:relative;z-index:1}
.pklnk{font-family:var(--m);font-size:10px;font-weight:700;color:var(--pu);letter-spacing:.06em;position:relative;z-index:1}

/* BOOKING CTA */
.bk-wrap{padding:clamp(2.5rem,5vw,4.5rem);border-radius:var(--r2);background:linear-gradient(140deg,rgba(192,38,211,.12) 0%,rgba(124,58,237,.08) 55%,transparent 100%);border:1px solid var(--pb);text-align:center;position:relative;overflow:hidden;margin:clamp(3rem,6vw,5.5rem) 0}
.bk-wrap::before{content:'';position:absolute;top:-100px;right:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(192,38,211,.14),transparent 65%);pointer-events:none}
.bk-k{font-family:var(--m);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--pu);margin-bottom:.8rem;position:relative;z-index:1}
.bk-title{font-family:var(--d);font-size:clamp(2rem,5vw,4.2rem);line-height:.9;text-transform:uppercase;margin:0 0 1rem;letter-spacing:.01em;position:relative;z-index:1}
.bk-sub{color:var(--muted);font-size:1rem;line-height:1.65;max-width:46ch;margin:0 auto 1.8rem;position:relative;z-index:1}
.bk-cta{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;position:relative;z-index:1}

/* FOOTER */
footer{position:relative;z-index:2;border-top:1px solid var(--line);background:rgba(0,0,0,.4);padding:clamp(3rem,6vw,5rem) 0 2rem}
.foot-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:760px){.foot-grid{grid-template-columns:1.4fr 1fr 1fr}}
.foot-brand{font-family:var(--d);font-size:1.9rem;text-transform:uppercase;margin:0 0 .6rem;letter-spacing:.02em}
.foot-brand small{display:block;font-family:var(--m);font-size:9px;letter-spacing:.26em;color:var(--muted);margin-top:.4rem}
.foot-col h4{font-family:var(--m);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin:0 0 .8rem}
.foot-col a{display:block;font-size:.9rem;line-height:1.9;color:var(--muted);transition:.15s}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   DATA LAYER  — swap localStorage stubs for Supabase here
   ═══════════════════════════════════════════════════════
   SUPABASE INTEGRATION POINT:
   const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
   load: (await sb.from('epk').select('*').eq('slug','ambar')).data[0]
   save: await sb.from('epk').upsert({slug:'ambar', ...data})
*/
const _SB_URL = '%%SUPABASE_URL%%';
const _SB_KEY = '%%SUPABASE_KEY%%';
const _sb = window.supabase ? window.supabase.createClient(_SB_URL, _SB_KEY) : null;
// Analytics: track EPK views (non-blocking)
if(_sb) _sb.from('epk_views').insert({slug:'%%EPK_SLUG%%',viewed_at:new Date().toISOString()}).catch(()=>{});
const DL = {
  KEY:'epk_%%EPK_SLUG%%_v2',
  TS:'epk_%%EPK_SLUG%%_ts',
  load(){ try{const d=localStorage.getItem(this.KEY);return d?JSON.parse(d):null}catch(e){return null} },
  save(d){
    const ts=new Date().toISOString();
    try{localStorage.setItem(this.KEY,JSON.stringify(d));localStorage.setItem(this.TS,ts)}catch(e){}
    if(_sb) _sb.from('epk').upsert({slug:'%%EPK_SLUG%%',data:d,updated_at:ts}).catch(()=>{});
  },
  async sync(){
    if(!_sb) return null;
    try{
      const {data,error}=await _sb.from('epk').select('data,updated_at').eq('slug','ambar-lombardi').single();
      if(data&&!error){
        const remoteTs=new Date(data.updated_at).getTime();
        const localTs=new Date(localStorage.getItem(this.TS)||0).getTime();
        if(remoteTs>localTs){
          localStorage.setItem(this.KEY,JSON.stringify(data.data));
          localStorage.setItem(this.TS,data.updated_at);
          return data.data;
        }
      }
    }catch(e){}
    return null;
  }
};

const RAW = JSON.parse(document.getElementById('epk-data').textContent);
let EPK = DL.load() || JSON.parse(JSON.stringify(RAW));
let cdTimer = null;
let curLang = 'es';

/* ── HELPERS ─────────────────────────────────────────── */
const $=id=>document.getElementById(id);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800)}
function fmtD(ds,opts){return new Date(ds+'T00:00:00').toLocaleDateString('es-PE',opts)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ── LOADER ──────────────────────────────────────────── */

document.addEventListener('click',e=>{if(!e.target.closest('.nav')&&!e.target.closest('#admTrigger'))$('navLinks').classList.remove('open')});

/* ── COUNTDOWN ───────────────────────────────────────── */
function startCD(ds){
  if(cdTimer)clearInterval(cdTimer);
  function tick(){
    const diff=new Date(ds+'T00:00:00')-new Date();
    const g=id=>document.getElementById(id);
    if(!g('cd-d'))return;
    const p=n=>String(Math.floor(Math.max(0,n))).padStart(2,'0');
    if(diff<=0){['cd-d','cd-h','cd-m','cd-s'].forEach(id=>{const e=g(id);if(e)e.textContent='00'});return}
    const e=g('cd-d');if(e)e.textContent=p(diff/864e5);
    const h=g('cd-h');if(h)h.textContent=p((diff%864e5)/36e5);
    const mi=g('cd-m');if(mi)mi.textContent=p((diff%36e5)/6e4);
    const s=g('cd-s');if(s)s.textContent=p((diff%6e4)/1e3);
  }
  tick();cdTimer=setInterval(tick,1000);
}

/* ── REVEAL ──────────────────────────────────────────── */
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})
  },{threshold:.1});
  document.querySelectorAll('.rev').forEach(el=>io.observe(el));
}

function renderHero(){
  const a=EPK.artist;
  const today=new Date().toISOString().split('T')[0];

function renderBio(){
  const a=EPK.artist;
  const s=EPK.social;
  const socLinks=[
    s.instagram&&`<a class="soc-pill" href="${esc(s.instagram)}" target="_blank" rel="noopener">Instagram</a>`,
    s.soundcloud&&`<a class="soc-pill" href="${esc(s.soundcloud)}" target="_blank" rel="noopener">SoundCloud</a>`,
    s.youtube&&`<a class="soc-pill" href="${esc(s.youtube)}" target="_blank" rel="noopener">YouTube</a>`,
    s.facebook&&`<a class="soc-pill" href="${esc(s.facebook)}" target="_blank" rel="noopener">Facebook</a>`,
    s.spotify&&`<a class="soc-pill" href="${esc(s.spotify)}" target="_blank" rel="noopener">Spotify</a>`,
    s.tiktok&&`<a class="soc-pill" href="${esc(s.tiktok)}" target="_blank" rel="noopener">TikTok</a>`
  ].filter(Boolean).join('');
  const bioEs=EPK.bio.es;
  const bioBody=(bioEs.body||'').split('\n\n').filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join('');
  return `<section class="sec" id="bio" data-screen-label="bio">
    <div class="w">
      <div class="sec-hd rev">
        <div class="sec-hd-l"><span class="sec-num">01 / 05</span><span class="sec-label">Biografía</span></div>
        <div class="sec-hd-r">ES / EN / PT<br>Multi-idioma</div>
      </div>
      <h2 class="sec-title rev">Identidad sonora,<br><em>escena</em> y proyección</h2>
      <div class="bio-grid" style="margin-top:2.5rem">
        <div>
          <div class="bio-langs" id="bioLangs">

/* ── GALLERY FILTER + LIGHTBOX ───────────────────────── */
function bindGallery(){
  // filter
  document.querySelectorAll('.gfbtn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.gfbtn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      const f=btn.dataset.filter;
      document.querySelectorAll('.gtile').forEach(t=>{t.style.display=(f==='all'||t.dataset.cat===f)?'':'none'});
    };
  });
  // lightbox
  const lb=$('lb'),lbImg=$('lbImg');
  let cur=0;
  const vis=()=>[...document.querySelectorAll('.gtile')].filter(x=>x.style.display!=='none');
  function getSrc(tile){const d=tile.querySelector('div[style]');if(d){const m=d.style.backgroundImage.match(/url\(['"]?([^'"\)]+)['"]?\)/);return m?m[1]:''}return ''}
  function open(idx){const v=vis();if(!v.length)return;cur=idx;lbImg.src=getSrc(v[cur]);lb.classList.add('on');document.body.style.overflow='hidden'}
  function close(){lb.classList.remove('on');document.body.style.overflow=''}
  document.querySelectorAll('.gtile').forEach(t=>t.onclick=()=>{const v=vis();open(v.indexOf(t))});
  $('lbClose').onclick=close;
  $('lbPrev').onclick=()=>{const v=vis();cur=(cur-1+v.length)%v.length;lbImg.src=getSrc(v[cur])};
  $('lbNext').onclick=()=>{const v=vis();cur=(cur+1)%v.length;lbImg.src=getSrc(v[cur])};
  $('lb').onclick=e=>{if(e.target===$('lb'))close()};
  document.addEventListener('keydown',e=>{
    if(!lb.classList.contains('on'))return;
    if(e.key==='Escape')close();
    if(e.key==='ArrowLeft')$('lbPrev').click();
    if(e.key==='ArrowRight')$('lbNext').click();
  });
}

          <div class="af"><label>Nombre</label><input data-pkf="${i}-name" value="${esc(item.name)}"></div>
          <div class="af"><label>Icono (emoji)</label><input data-pkf="${i}-icon" value="${esc(item.icon)}"></div>
          <div class="af a-full"><label>URL del recurso (Drive, Dropbox…)</label><input data-pkf="${i}-url" value="${esc(item.url)}"></div>
          <div class="af"><label>Formato</label><input data-pkf="${i}-format" value="${esc(item.format)}"></div>
          <div class="af"><label>Tamaño / Label</label><input data-pkf="${i}-size" value="${esc(item.size)}"></div>
        </div>
      </div>`).join('')}</div>
    <button class="a-add" id="add-pk">+ Agregar recurso</button>`;
    ct.querySelectorAll('[data-rm-pk]').forEach(btn=>{
      btn.onclick=()=>{EPK.presskit.items.splice(+btn.dataset.rmPk,1);DL.save(EPK);renderTab('presskit');renderAll()};
    });
    $('add-pk').onclick=()=>{
      EPK.presskit.items.push({id:Date.now(),name:'',icon:'📁',url:'',format:'',size:''});
      DL.save(EPK);renderTab('presskit');renderAll();
    };
  }
  else if(tab==='redes'){
    const s=EPK.social;
    ct.innerHTML=`<div class="a-sec">Redes sociales y streaming</div>
    <div class="ag">
      <div class="af"><label>Instagram (URL)</label><input id="fs-ig" value="${esc(s.instagram)}"></div>
      <div class="af"><label>SoundCloud (URL)</label><input id="fs-sc" value="${esc(s.soundcloud)}"></div>
      <div class="af"><label>YouTube (URL)</label><input id="fs-yt" value="${esc(s.youtube)}"></div>
      <div class="af"><label>Facebook (URL)</label><input id="fs-fb" value="${esc(s.facebook)}"></div>
      <div class="af"><label>Spotify (URL, opcional)</label><input id="fs-sp" value="${esc(s.spotify||'')}"></div>
      <div class="af"><label>TikTok (URL, opcional)</label><input id="fs-tt" value="${esc(s.tiktok||'')}"></div>
    </div>`;
  }
  else if(tab==='config'){
    ct.innerHTML=`<div class="a-sec">Configuración del admin</div>
    <div class="ag">
      <div class="af"><label>Contraseña actual</label><input type="password" id="fc-cur" placeholder="Contraseña actual"></div>
      <div class="af a-full"></div>
      <div class="af"><label>Nueva contraseña</label><input type="password" id="fc-new" placeholder="Nueva contraseña"></div>
      <div class="af"><label>Confirmar nueva contraseña</label><input type="password" id="fc-con" placeholder="Confirmar nueva"></div>
    </div>
    <button class="a-add" id="change-pwd" style="margin-top:1rem">Cambiar contraseña</button>
    <div class="a-sec" style="margin-top:1.5rem">Peligro</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="a-add" id="reset-data" style="border-color:rgba(239,68,68,.4);color:#ef4444">↺ Restaurar datos originales</button>
    </div>
    `;
    $('change-pwd').onclick=()=>{
      const cur=$('fc-cur').value,nw=$('fc-new').value,con=$('fc-con').value;
      if(cur!==EPK.admin.password){toast('Contraseña actual incorrecta');return}
      if(!nw){toast('Ingresá la nueva contraseña');return}
      if(nw!==con){toast('Las contraseñas no coinciden');return}
      EPK.admin.password=nw;DL.save(EPK);
      $('fc-cur').value='';$('fc-new').value='';$('fc-con').value='';
      toast('¡Contraseña actualizada!');
    };
    $('reset-data').onclick=()=>{
      if(confirm('¿Restaurar todos los datos al original? Se perderán los cambios.')){
        EPK=JSON.parse(JSON.stringify(RAW));DL.save(EPK);renderAll();renderTab('config');toast('Datos restaurados');
      }
    };
  }
}

/* ── SAVE ALL ────────────────────────────────────────── */
function collectTab(tab){
  const ct=$('admCt');
  if(tab==='artista'){
    EPK.artist.name=ct.querySelector('#fa-name').value.trim()||EPK.artist.name;
    EPK.artist.tagline=ct.querySelector('#fa-tag').value.trim()||EPK.artist.tagline;
    EPK.artist.location=ct.querySelector('#fa-loc').value.trim();
    EPK.artist.contact=ct.querySelector('#fa-mail').value.trim();
    EPK.artist.whatsapp=ct.querySelector('#fa-wa').value.trim();
    EPK.artist.genres=ct.querySelector('#fa-genres').value.split(',').map(x=>x.trim()).filter(Boolean);
    EPK.artist.stats.debut=ct.querySelector('#fa-debut').value.trim();
    EPK.artist.stats.shows=ct.querySelector('#fa-shows').value.trim();
    EPK.artist.stats.countries=ct.querySelector('#fa-countries').value.trim();
    EPK.artist.heroPhoto=ct.querySelector('#fa-hero').value.trim();
    EPK.artist.bioPhoto=ct.querySelector('#fa-bio').value.trim();
  } else if(tab==='bio'){
    ['es','en','pt'].forEach(lang=>{
      const l=ct.querySelector(`#fb-lede-${lang}`);const b=ct.querySelector(`#fb-body-${lang}`);
      if(!EPK.bio[lang])EPK.bio[lang]={lede:'',body:''};
      if(l)EPK.bio[lang].lede=l.value.trim();
      if(b)EPK.bio[lang].body=b.value.trim();
    });
  } else if(tab==='shows'){
    ct.querySelectorAll('[data-sf]').forEach(el=>{
      const[i,k]=el.dataset.sf.split('-');
      if(EPK.shows[+i])EPK.shows[+i][k]=el.value;
    });
  } else if(tab==='galeria'){
    ct.querySelectorAll('[data-gf]').forEach(el=>{
      const[i,k]=el.dataset.gf.split('-');
      if(EPK.gallery[+i])EPK.gallery[+i][k]=el.value;
    });
  } else if(tab==='musica'){
    ct.querySelectorAll('[data-mf]').forEach(el=>{
      const parts=el.dataset.mf.split('-');const i=parts[0];const k=parts.slice(1).join('-');
      if(EPK.music[+i])EPK.music[+i][k]=el.value;
    });
  } else if(tab==='presskit'){
    const d=ct.querySelector('#fpk-desc');
    if(d)EPK.presskit.description=d.value.trim();
    ct.querySelectorAll('[data-pkf]').forEach(el=>{
      const[i,k]=el.dataset.pkf.split('-');
      if(EPK.presskit.items[+i])EPK.presskit.items[+i][k]=el.value;
    });
  } else if(tab==='redes'){
    EPK.social.instagram=ct.querySelector('#fs-ig').value.trim();
    EPK.social.soundcloud=ct.querySelector('#fs-sc').value.trim();
    EPK.social.youtube=ct.querySelector('#fs-yt').value.trim();
    EPK.social.facebook=ct.querySelector('#fs-fb').value.trim();
    EPK.social.spotify=ct.querySelector('#fs-sp').value.trim();
    EPK.social.tiktok=ct.querySelector('#fs-tt').value.trim();
  }
}
function saveAll(){
  collectTab(curTab);
  // update epk-data script
  document.getElementById('epk-data').textContent=JSON.stringify(EPK,null,2);
  DL.save(EPK);
  renderAll();
  toast('¡Guardado!');
}

/* ── EXPORT HTML ─────────────────────────────────────── */
function exportHTML(){
  collectTab(curTab);
  document.getElementById('epk-data').textContent=JSON.stringify(EPK,null,2);
  DL.save(EPK);
  // close admin overlay for clean export
  $('admOv').classList.remove('open');
  setTimeout(()=>{
    const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`ambar_lombardi_epk_${new Date().toISOString().split('T')[0]}.html`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    $('admOv').classList.add('open');
    toast('HTML exportado · standalone listo');
  },400);
}

/* ── INIT ────────────────────────────────────────────── */
renderAll();
if(isAuth)showPanel();
// Sync latest data from Supabase (non-blocking)
DL.sync().then(remote=>{if(remote){EPK=remote;renderAll();}}).catch(()=>{});
</script>
