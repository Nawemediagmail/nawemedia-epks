<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEMIX — DJ EPK</title>
<meta name="description" content="DJ YEMIX — Tribal House, Circuit, Tech House, Afro House. Buenos Aires · Argentina. Booking: Castromarvi@gmail.com">
<meta property="og:title" content="YEMIX — DJ EPK">
<meta property="og:description" content="Circuit energy, tribal soul. 500+ shows. 6 países. Desde 2013.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pu: #f04fcf;
  --pur: 240,79,207;
  --pu2: #8f63ff;
  --bg: #070707;
  --bg2: #121018;
  --bg3: #1a1525;
  --text: #ffffff;
  --text2: #b9a9c9;
  --lime: #d7ff3f;
  --muted: rgba(185,169,201,.7);
  --faint: rgba(185,169,201,.25);
  --d: 'Anton', Impact, sans-serif;
  --h: 'Oswald', sans-serif;
  --s: 'Inter', system-ui, sans-serif;
  --m: 'JetBrains Mono', monospace;
  --max: 1320px;
  --gap: clamp(1.25rem, 4vw, 3rem);
  --r: 16px; --r2: 22px; --r3: 32px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--s);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden}
.loader-name{font-family:var(--d);font-size:clamp(2.5rem,8vw,6rem);letter-spacing:.15em;background:linear-gradient(135deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.9rem var(--gap);display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,7,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--faint)}
.nav-logo{font-family:var(--d);font-size:1.4rem;letter-spacing:.12em;background:linear-gradient(90deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:1.8rem;align-items:center}
.nav-links a{font-family:var(--m);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);transition:color .2s}
.nav-links a:hover{color:var(--pu)}
.nav-admin{background:none;border:1px solid var(--faint);color:var(--text2);padding:.35rem .7rem;border-radius:8px;font-size:.8rem;transition:all .2s}
.nav-admin:hover{border-color:var(--pu);color:var(--pu)}
@media(max-width:600px){.nav-links a:not(.nav-admin){display:none}}

/* HERO */
#hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;padding:calc(var(--gap)*2) var(--gap) calc(var(--gap)*2);overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a0a2e 0%,#0a0515 40%,#070707 100%);z-index:0;background-size:cover;background-position:center top}
.hero-bg[style]{background:none}
.hero-bg[style]::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,7,.92) 0%,rgba(7,7,7,.6) 50%,rgba(7,7,7,.35) 100%);z-index:1}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 30%,rgba(var(--pur),.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 20% 80%,rgba(143,99,255,.12) 0%,transparent 60%)}
.hero-beams{position:absolute;inset:0;overflow:hidden;z-index:2}
.beam{position:absolute;width:1px;background:linear-gradient(180deg,transparent,rgba(var(--pur),.4),transparent);animation:beam-fall linear infinite}
@keyframes beam-fall{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.hero-content{position:relative;z-index:3;max-width:var(--max);width:100%;margin:0 auto}
.hero-genres{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem}
.genre-tag{font-family:var(--m);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .8rem;border:1px solid rgba(var(--pur),.35);border-radius:999px;color:var(--pu);background:rgba(var(--pur),.08)}
.hero-name{font-family:var(--d);font-size:clamp(4rem,15vw,11rem);line-height:.9;letter-spacing:.03em;margin-bottom:.5rem}
.hero-name span{background:linear-gradient(135deg,#fff 0%,var(--text2) 40%,var(--pu) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-tagline{font-family:var(--h);font-size:clamp(1rem,2.5vw,1.5rem);font-weight:400;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2.5rem}
.hero-stats{display:flex;gap:clamp(1.5rem,4vw,3rem);margin-bottom:2.5rem;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:.2rem}
.stat-num{font-family:var(--d);font-size:clamp(1.8rem,4vw,2.8rem);background:linear-gradient(135deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-label{font-family:var(--m);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;background:linear-gradient(135deg,var(--pu),var(--pu2));color:#fff;font-family:var(--h);font-size:1rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:var(--r);transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(var(--pur),.4)}
.btn-secondary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;border:1px solid rgba(var(--pur),.4);color:var(--pu);font-family:var(--h);font-size:1rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:var(--r);transition:all .2s}
.btn-secondary:hover{background:rgba(var(--pur),.1);border-color:var(--pu)}
.hero-location{position:absolute;top:calc(var(--gap)*3);right:var(--gap);font-family:var(--m);font-size:.75rem;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;z-index:2}

/* SECTION BASE */
section{padding:clamp(4rem,8vw,7rem) var(--gap)}
.section-inner{max-width:var(--max);margin:0 auto}
.section-label{font-family:var(--m);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--pu);margin-bottom:.8rem}
.section-title{font-family:var(--d);font-size:clamp(2rem,5vw,3.5rem);line-height:1;margin-bottom:2rem}

/* BIO */
#bio{background:var(--bg2)}
.bio-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:clamp(2rem,5vw,4rem);align-items:start}
@media(max-width:768px){.bio-grid{grid-template-columns:1fr}}
.bio-photo-wrap{position:relative;border-radius:var(--r2);overflow:hidden;aspect-ratio:3/4}
.bio-photo-wrap img{width:100%;height:100%;object-fit:cover}
.bio-photo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(var(--pur),.3) 0%,transparent 60%)}
.bio-highlights{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;margin-bottom:2rem}
.highlight{background:rgba(var(--pur),.07);border:1px solid rgba(var(--pur),.2);border-radius:var(--r);padding:.9rem 1rem}
.hl-num{font-family:var(--d);font-size:1.8rem;background:linear-gradient(135deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.2rem}
.hl-label{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.bio-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.bio-tab{font-family:var(--m);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);transition:all .2s;cursor:pointer}
.bio-tab.active{background:var(--pu);border-color:var(--pu);color:#fff}
.bio-lede{font-family:var(--h);font-size:clamp(1rem,2vw,1.25rem);font-weight:400;color:var(--text2);line-height:1.5;margin-bottom:1.2rem;font-style:italic}
.bio-body{color:var(--text2);line-height:1.8;font-size:.95rem}
.bio-body p{margin-bottom:1rem}
.bio-content{display:none}
.bio-content.active{display:block}

/* MUSIC */
#music{background:var(--bg)}
.music-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,480px),1fr));gap:1.5rem}
.music-card{background:rgba(255,255,255,.03);border:1px solid var(--faint);border-radius:var(--r2);overflow:hidden;transition:border-color .2s}
.music-card:hover{border-color:rgba(var(--pur),.4)}
.music-card-header{padding:1.2rem 1.5rem .8rem;display:flex;align-items:center;gap:.8rem}
.music-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--pu),var(--pu2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.music-title{font-family:var(--h);font-size:.95rem;font-weight:500;letter-spacing:.03em;color:var(--text)}
.music-type{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.music-embed{padding:0 .5rem .5rem}
.music-embed iframe{border-radius:10px;width:100%;height:166px;border:none}

/* GALLERY */
#gallery{background:var(--bg2)}
.gallery-filters{display:flex;gap:.6rem;margin-bottom:2rem;flex-wrap:wrap}
.filter-btn{font-family:var(--m);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);transition:all .2s;cursor:pointer}
.filter-btn.active{background:var(--pu);border-color:var(--pu);color:#fff}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:220px;gap:1rem}
@media(max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.gallery-grid{grid-template-columns:1fr;grid-auto-rows:280px}}
.gallery-item{border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;background:var(--bg3)}
.gallery-item.feat{grid-column:span 2;grid-row:span 2}
.gallery-item.tall{grid-row:span 2}
.gallery-item.wide{grid-column:span 2}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.gallery-item:hover img{transform:scale(1.05)}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,7,.8) 0%,transparent 50%);opacity:0;transition:opacity .3s}
.gallery-item:hover .gallery-item-overlay{opacity:1}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:1rem;font-family:var(--h);font-size:.85rem;font-weight:500;transform:translateY(100%);transition:transform .3s}
.gallery-item:hover .gallery-caption{transform:translateY(0)}
.gallery-placeholder{background:rgba(255,255,255,.04);border:1px dashed var(--faint);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem}
.gallery-placeholder span{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}

/* SHOWS */
#shows{background:var(--bg)}
.shows-empty{font-family:var(--h);color:var(--text2);font-size:1.1rem;font-weight:400}
.shows-list{display:flex;flex-direction:column;gap:1rem}
.show-card{display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--faint);border-radius:var(--r2);padding:1.5rem 2rem;transition:border-color .2s}
.show-card:hover{border-color:rgba(var(--pur),.35)}
@media(max-width:600px){.show-card{grid-template-columns:1fr;gap:.8rem}}
.show-date{font-family:var(--d);font-size:2rem;color:var(--pu);line-height:1;min-width:60px;text-align:center}
.show-date-sub{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-align:center}
.show-info-venue{font-family:var(--h);font-size:1.1rem;font-weight:600;margin-bottom:.2rem}
.show-info-location{font-family:var(--m);font-size:.75rem;letter-spacing:.08em;color:var(--text2)}
.show-badge{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .8rem;border-radius:999px;border:1px solid rgba(var(--pur),.35);color:var(--pu)}

/* PRESSKIT */
#presskit{background:var(--bg2)}
.presskit-desc{color:var(--text2);margin-bottom:2rem;max-width:600px}
.presskit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.pk-item{background:rgba(255,255,255,.03);border:1px solid var(--faint);border-radius:var(--r2);padding:1.5rem;display:flex;flex-direction:column;gap:1rem;transition:border-color .2s,background .2s}
.pk-item:hover{border-color:rgba(var(--pur),.35);background:rgba(var(--pur),.05)}
.pk-icon{font-size:2rem;line-height:1}
.pk-name{font-family:var(--h);font-size:1rem;font-weight:600}
.pk-meta{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.pk-link{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--m);font-size:.75rem;letter-spacing:.08em;color:var(--pu);border:1px solid rgba(var(--pur),.3);padding:.4rem .9rem;border-radius:999px;transition:all .2s;margin-top:auto}
.pk-link:hover{background:rgba(var(--pur),.1)}

/* FOOTER */
footer{background:var(--bg);border-top:1px solid var(--faint);padding:clamp(3rem,6vw,5rem) var(--gap) 2rem}
.footer-inner{max-width:var(--max);margin:0 auto}
.footer-top{display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;margin-bottom:3rem}
@media(max-width:600px){.footer-top{grid-template-columns:1fr}}
.footer-name{font-family:var(--d);font-size:clamp(2.5rem,8vw,5rem);line-height:.9;background:linear-gradient(135deg,#fff,var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.footer-contact{display:flex;flex-direction:column;gap:.6rem;text-align:right}
@media(max-width:600px){.footer-contact{text-align:left}}
.contact-label{font-family:var(--m);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text2)}
.contact-value{font-family:var(--h);font-size:1rem;font-weight:500;color:var(--pu)}
.social-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:3rem}
.social-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);padding:.5rem 1rem;border:1px solid var(--faint);border-radius:999px;transition:all .2s}
.social-link:hover{color:var(--pu);border-color:rgba(var(--pur),.4)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;border-top:1px solid var(--faint);flex-wrap:wrap;gap:1rem}
.footer-copy{font-family:var(--m);font-size:.65rem;letter-spacing:.08em;color:var(--faint)}
.footer-nawemedia{font-family:var(--m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.footer-nawemedia span{color:var(--pu)}

/* ADMIN OVERLAY */
#admOv{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);overflow-y:auto;padding:2rem var(--gap)}
#admOv.open{display:flex;align-items:flex-start;justify-content:center}
.adm-panel{background:var(--bg2);border:1px solid rgba(var(--pur),.3);border-radius:var(--r3);width:100%;max-width:800px;overflow:hidden}
.adm-header{padding:1.5rem 2rem;border-bottom:1px solid var(--faint);display:flex;align-items:center;justify-content:space-between}
.adm-title{font-family:var(--d);font-size:1.5rem;letter-spacing:.08em}
.adm-close{font-size:1.5rem;color:var(--text2);transition:color .2s}
.adm-close:hover{color:var(--pu)}
.adm-body{padding:2rem}
#admLogin{display:flex;flex-direction:column;gap:1rem}
#admLogin input{background:rgba(255,255,255,.05);border:1px solid var(--faint);border-radius:var(--r);padding:.8rem 1rem;color:var(--text);font-family:var(--s);font-size:.95rem;outline:none;transition:border-color .2s}
#admLogin input:focus{border-color:var(--pu)}
.adm-save-btn{padding:.8rem 2rem;background:linear-gradient(135deg,var(--pu),var(--pu2));color:#fff;font-family:var(--h);font-size:.95rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:var(--r);transition:transform .2s,box-shadow .2s}
.adm-save-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(var(--pur),.4)}
.adm-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:2rem}
.adm-tab{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .9rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);cursor:pointer;transition:all .2s}
.adm-tab.active{background:var(--pu);border-color:var(--pu);color:#fff}
.adm-field{margin-bottom:1.2rem}
.adm-label{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:.4rem;display:block}
.adm-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--faint);border-radius:var(--r);padding:.7rem 1rem;color:var(--text);font-family:var(--s);font-size:.9rem;outline:none;transition:border-color .2s}
.adm-input:focus{border-color:var(--pu)}
.adm-textarea{resize:vertical;min-height:100px}
.adm-content{display:none}
.adm-content.active{display:block}

/* TOAST */
#toast{position:fixed;bottom:2rem;right:2rem;background:var(--pu);color:#fff;font-family:var(--h);font-size:.9rem;font-weight:600;padding:.8rem 1.5rem;border-radius:var(--r);opacity:0;transform:translateY(1rem);transition:all .3s;pointer-events:none;z-index:300}
#toast.show{opacity:1;transform:translateY(0)}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.95);align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:var(--r)}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;font-size:2rem;color:var(--text2);cursor:pointer;transition:color .2s}
.lb-close:hover{color:var(--pu)}
</style>
</head>
<body>

<div id="loader"><div class="loader-name">YEMIX</div></div>

<nav>
  <div class="nav-logo">YEMIX</div>
  <div class="nav-links">
    <a href="#bio">Bio</a>
    <a href="#music">Música</a>
    <a href="#gallery">Galería</a>
    <a href="#shows">Shows</a>
    <a href="#presskit">Press Kit</a>
    <button class="nav-admin" onclick="openAdmin()">⚙️</button>
  </div>
</nav>

<main id="main"></main>

<div id="admOv">
  <div class="adm-panel">
    <div class="adm-header">
      <div class="adm-title">ADMIN PANEL</div>
      <button class="adm-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="adm-body">
      <div id="admLogin">
        <input type="password" id="admPwd" placeholder="Contraseña admin" onkeydown="if(event.key==='Enter')admAuth()">
        <button class="adm-save-btn" onclick="admAuth()">Acceder</button>
      </div>
      <div id="admPanel" style="display:none">
        <div class="adm-tabs">
          <button class="adm-tab active" onclick="admTab(this,'artista')">Artista</button>
          <button class="adm-tab" onclick="admTab(this,'bio')">Bio</button>
          <button class="adm-tab" onclick="admTab(this,'shows')">Shows</button>
          <button class="adm-tab" onclick="admTab(this,'galeria')">Galería</button>
          <button class="adm-tab" onclick="admTab(this,'musica')">Música</button>
          <button class="adm-tab" onclick="admTab(this,'presskit')">Press Kit</button>
          <button class="adm-tab" onclick="admTab(this,'config')">Config</button>
        </div>
        <div id="adm-artista" class="adm-content active">
          <div class="adm-field"><label class="adm-label">Nombre artístico</label><input class="adm-input" id="a-name"></div>
          <div class="adm-field"><label class="adm-label">Tagline</label><input class="adm-input" id="a-tagline"></div>
          <div class="adm-field"><label class="adm-label">Ubicación</label><input class="adm-input" id="a-location"></div>
          <div class="adm-field"><label class="adm-label">Email booking</label><input class="adm-input" id="a-contact"></div>
          <div class="adm-field"><label class="adm-label">WhatsApp</label><input class="adm-input" id="a-whatsapp"></div>

const DL = {
  load() {
    try {

      return d ? JSON.parse(d) : null;
    } catch(e){ return null; }
  },
  save(d) {
    const ts = new Date().toISOString();
    try {
      localStorage.setItem('epk_'+SLUG+'_v2', JSON.stringify(d));
      localStorage.setItem('epk_'+SLUG+'_ts', ts);
    } catch(e){}
    if(_sb) {
      _sb.from('epk').upsert({slug:SLUG,data:d,updated_at:ts},{onConflict:'slug'}).then(()=>{});
    }
  },
  sync() {
    if(!_sb) return;
    const localTs = localStorage.getItem('epk_'+SLUG+'_ts') || '0';
    _sb.from('epk').select('data,updated_at').eq('slug',SLUG).single().then(({data})=>{
      if(data && data.updated_at > localTs) {
        EPK = data.data;
        localStorage.setItem('epk_'+SLUG+'_v2', JSON.stringify(EPK));
        localStorage.setItem('epk_'+SLUG+'_ts', data.updated_at);
        renderAll();
      }
    });
  }
};

}

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));

    item.style.display = (cat==='all' || item.dataset.cat===cat) ? '' : 'none';

    localStorage.setItem('epk_'+SLUG+'_auth','1');
    loadAdmFields();
  } else {
    showToast('Contraseña incorrecta');
  }
}

function admTab(btn, tab) {
  document.querySelectorAll('.adm-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.adm-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('adm-'+tab).classList.add('active');
}

function loadAdmFields() {
  const a = EPK.artist;
  document.getElementById('a-name').value = a.name||'';
  document.getElementById('a-tagline').value = a.tagline||'';
  document.getElementById('a-location').value = a.location||'';
  document.getElementById('a-contact').value = a.contact||'';
  document.getElementById('a-whatsapp').value = a.whatsapp||'';
  document.getElementById('a-hero').value = a.heroPhoto||'';
  document.getElementById('a-bio-photo').value = a.bioPhoto||'';
  document.getElementById('a-genres').value = (a.genres||[]).join(', ');
  document.getElementById('a-debut').value = a.stats.debut||'';
  document.getElementById('a-shows').value = a.stats.shows||'';
  document.getElementById('a-countries').value = a.stats.countries||'';
  document.getElementById('b-lede-es').value = EPK.bio.es.lede||'';
  document.getElementById('b-body-es').value = EPK.bio.es.body||'';
  document.getElementById('b-lede-en').value = EPK.bio.en.lede||'';
  document.getElementById('b-body-en').value = EPK.bio.en.body||'';
  document.getElementById('b-lede-pt').value = EPK.bio.pt.lede||'';
  document.getElementById('b-body-pt').value = EPK.bio.pt.body||'';
  document.getElementById('s-json').value = JSON.stringify(EPK.shows||[], null, 2);
  document.getElementById('g-json').value = JSON.stringify(EPK.gallery||[], null, 2);
  document.getElementById('m-json').value = JSON.stringify(EPK.music||[], null, 2);
  document.getElementById('pk-desc').value = (EPK.presskit||{}).description||'';
  document.getElementById('pk-json').value = JSON.stringify((EPK.presskit||{}).items||[], null, 2);
  const s = EPK.social||{};
  document.getElementById('sc-ig').value = s.instagram||'';
  document.getElementById('sc-sc').value = s.soundcloud||'';
  document.getElementById('sc-yt').value = s.youtube||'';
  document.getElementById('sc-fb').value = s.facebook||'';
  document.getElementById('sc-sp').value = s.spotify||'';
  document.getElementById('sc-tt').value = s.tiktok||'';
}

function admSave() {
  try {
    EPK.artist.name = document.getElementById('a-name').value;
    EPK.artist.tagline = document.getElementById('a-tagline').value;
    EPK.artist.location = document.getElementById('a-location').value;
    EPK.artist.contact = document.getElementById('a-contact').value;
    EPK.artist.whatsapp = document.getElementById('a-whatsapp').value;
    EPK.artist.heroPhoto = document.getElementById('a-hero').value;
    EPK.artist.bioPhoto = document.getElementById('a-bio-photo').value;
    EPK.artist.genres = document.getElementById('a-genres').value.split(',').map(g=>g.trim()).filter(Boolean);
    EPK.artist.stats.debut = document.getElementById('a-debut').value;
    EPK.artist.stats.shows = document.getElementById('a-shows').value;
    EPK.artist.stats.countries = document.getElementById('a-countries').value;
    EPK.bio.es.lede = document.getElementById('b-lede-es').value;
    EPK.bio.es.body = document.getElementById('b-body-es').value;
    EPK.bio.en.lede = document.getElementById('b-lede-en').value;
    EPK.bio.en.body = document.getElementById('b-body-en').value;
    EPK.bio.pt.lede = document.getElementById('b-lede-pt').value;
    EPK.bio.pt.body = document.getElementById('b-body-pt').value;
    EPK.shows = JSON.parse(document.getElementById('s-json').value||'[]');
    EPK.gallery = JSON.parse(document.getElementById('g-json').value||'[]');
    EPK.music = JSON.parse(document.getElementById('m-json').value||'[]');
    EPK.presskit.description = document.getElementById('pk-desc').value;
    EPK.presskit.items = JSON.parse(document.getElementById('pk-json').value||'[]');
    EPK.social.instagram = document.getElementById('sc-ig').value;
    EPK.social.soundcloud = document.getElementById('sc-sc').value;
    EPK.social.youtube = document.getElementById('sc-yt').value;
    EPK.social.facebook = document.getElementById('sc-fb').value;
    EPK.social.spotify = document.getElementById('sc-sp').value;
    EPK.social.tiktok = document.getElementById('sc-tt').value;
    const newPwd = document.getElementById('cfg-pwd').value;
    if(newPwd) EPK.admin.password = newPwd;
    DL.save(EPK);
    renderAll();
    showToast('✓ Guardado');
  } catch(e) { showToast('Error: '+e.message); }
}

function admReset() {
  if(!confirm('Restaurar datos originales?')) return;
  localStorage.removeItem('epk_'+SLUG+'_v2');
  localStorage.removeItem('epk_'+SLUG+'_ts');
  EPK = JSON.parse(document.getElementById('epk-data').textContent);
  renderAll();
  loadAdmFields();
  showToast('↩ Restaurado');
}

function admExport() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'yemix-epk.html';
  a.click();
  showToast('↓ Exportado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
