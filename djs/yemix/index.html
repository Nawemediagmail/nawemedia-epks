<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEMIX — DJ EPK</title>
<meta name="description" content="DJ YEMIX — Tribal House, Circuit, Tech House, Afro House. Buenos Aires · Argentina. Booking: Castromarvi@gmail.com">
<meta property="og:title" content="YEMIX — DJ EPK">
<meta property="og:description" content="Circuit energy, tribal soul. 500+ shows. 6 países. Desde 2013.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pu:  #FF00AA;
  --pur: 255,0,170;
  --pu2: #8B00FF;
  --cy:  #00FFFF;
  --cyr: 0,255,255;
  --gold:#D4AF37;
  --bg:  #07070f;
  --bg2: #0e0b1c;
  --bg3: #1b1530;
  --text: #F1F5F9;
  --text2:#94A3B8;
  --muted:rgba(148,163,184,.65);
  --faint:rgba(148,163,184,.16);
  --d:'Anton',Impact,sans-serif;
  --h:'Oswald',sans-serif;
  --s:'Inter',system-ui,sans-serif;
  --m:'JetBrains Mono',monospace;
  --max:1320px;
  --gap:clamp(1.25rem,4vw,3rem);
  --r:16px; --r2:22px; --r3:32px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--s);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden}
.loader-name{font-family:var(--d);font-size:clamp(2.5rem,8vw,6rem);letter-spacing:.2em;background:linear-gradient(120deg,#fff 0%,#f0ccff 25%,var(--pu) 65%,var(--pu2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:ld-pulse 1s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(var(--pur),.5))}
.loader-track{width:100px;height:2px;background:var(--faint);border-radius:999px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--pu),var(--pu2));border-radius:999px;animation:ld-fill .6s ease-out forwards}
@keyframes ld-fill{from{width:0}to{width:100%}}
@keyframes ld-pulse{0%,100%{opacity:.25}50%{opacity:1}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.8rem var(--gap);display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,15,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(var(--pur),.1)}
.nav-logo{font-family:var(--d);font-size:1.45rem;letter-spacing:.12em;background:linear-gradient(90deg,#fff 0%,var(--pu) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:1.6rem;align-items:center}
.nav-links a{font-family:var(--m);font-size:.68rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text2);transition:color .2s}
.nav-links a:hover{color:var(--pu)}
.nav-nawemedia{height:20px;width:auto;opacity:.45;transition:opacity .25s,filter .25s;filter:saturate(.3) brightness(1.2)}
.nav-nawemedia:hover{opacity:.8;filter:saturate(1) brightness(1)}
.nav-admin{color:rgba(148,163,184,.3);font-size:.75rem;width:26px;height:26px;border-radius:6px;border:1px solid transparent;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-admin:hover{color:var(--text2);border-color:var(--faint)}
@media(max-width:640px){.nav-links a:not(.nav-keep){display:none}}

/* HERO */
#hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;padding:calc(var(--gap)*2) var(--gap) clamp(3.5rem,8vh,5.5rem);overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a0a2e 0%,#0a0515 40%,var(--bg) 100%);z-index:0;background-size:cover;background-position:center top}
.hero-bg[style]{background:none}
.hero-bg[style]::before{content:'';position:absolute;inset:0;background:
  linear-gradient(to right,rgba(7,7,15,.97) 0%,rgba(7,7,15,.85) 38%,rgba(7,7,15,.3) 65%,rgba(7,7,15,.05) 100%),
  linear-gradient(to top,rgba(7,7,15,.95) 0%,rgba(7,7,15,.4) 42%,rgba(7,7,15,.08) 100%);z-index:1}
.hero-bg::after{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 55% 55% at 12% 85%,rgba(var(--pur),.18) 0%,transparent 65%),
  radial-gradient(ellipse 35% 35% at 80% 25%,rgba(var(--cyr),.06) 0%,transparent 60%);z-index:0}
.hero-beams{position:absolute;inset:0;overflow:hidden;z-index:2;pointer-events:none}
.beam{position:absolute;width:1px;background:linear-gradient(180deg,transparent,rgba(var(--pur),.4),transparent);animation:beam-fall linear infinite}
@keyframes beam-fall{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.hero-location{position:absolute;top:calc(var(--gap)*3);right:var(--gap);font-family:var(--m);font-size:.68rem;letter-spacing:.14em;color:var(--text2);text-transform:uppercase;z-index:3;display:flex;align-items:center;gap:.45rem}
.hero-location::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--cy);box-shadow:0 0 8px var(--cy),0 0 16px rgba(var(--cyr),.4);flex-shrink:0}
.hero-content{position:relative;z-index:3;max-width:min(640px,58vw);width:100%}
@media(max-width:768px){.hero-content{max-width:100%}}
.hero-genres{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.4rem}
.genre-tag{font-family:var(--m);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;padding:.28rem .75rem;border:1px solid rgba(var(--pur),.38);border-radius:999px;color:var(--pu);background:rgba(var(--pur),.08);backdrop-filter:blur(6px)}
.hero-name{font-family:var(--d);font-size:clamp(5.5rem,19vw,13.5rem);line-height:.88;letter-spacing:.02em;margin-bottom:.5rem}
.hero-name span{background:linear-gradient(115deg,#fff 0%,#f2daff 18%,var(--pu) 58%,var(--pu2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 28px rgba(var(--pur),.65)) drop-shadow(0 0 72px rgba(var(--pur),.3))}
.hero-tagline{font-family:var(--h);font-size:clamp(.9rem,2vw,1.3rem);font-weight:400;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.6rem}
.hero-divider{width:56px;height:2px;background:linear-gradient(90deg,var(--pu),transparent);margin-bottom:2rem;border-radius:999px}
.hero-stats{display:flex;gap:clamp(1.5rem,4vw,3.5rem);margin-bottom:2.5rem;flex-wrap:wrap;align-items:flex-end}
.stat{display:flex;flex-direction:column;gap:.2rem}
.stat-num{font-family:var(--d);font-size:clamp(2rem,4.5vw,3.2rem);background:linear-gradient(135deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat--cyan .stat-num{background:linear-gradient(135deg,var(--cy),#7dd8ff);-webkit-background-clip:text;background-clip:text}
.stat-label{font-family:var(--m);font-size:.58rem;letter-spacing:.17em;text-transform:uppercase;color:var(--text2)}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2.1rem;background:linear-gradient(135deg,var(--pu),var(--pu2));color:#fff;font-family:var(--h);font-size:1rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-radius:var(--r);transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(var(--pur),.45),0 0 60px rgba(var(--pur),.18)}
.btn-secondary{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2.1rem;border:1px solid rgba(var(--pur),.45);color:var(--pu);font-family:var(--h);font-size:1rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-radius:var(--r);transition:all .2s;backdrop-filter:blur(4px)}
.btn-secondary:hover{background:rgba(var(--pur),.12);border-color:var(--pu);box-shadow:0 0 24px rgba(var(--pur),.22)}

/* SECTION BASE */
section{padding:clamp(4rem,8vw,7rem) var(--gap)}
.section-inner{max-width:var(--max);margin:0 auto}
.section-label{font-family:var(--m);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--pu);margin-bottom:.7rem;display:flex;align-items:center;gap:.6rem}
.section-label::before{content:'';width:22px;height:1px;background:var(--pu);display:block;flex-shrink:0}
.section-title{font-family:var(--d);font-size:clamp(2rem,5vw,3.5rem);line-height:1;margin-bottom:2rem;letter-spacing:.02em}

/* BIO */
#bio{background:var(--bg2)}
.bio-grid{display:grid;grid-template-columns:1fr 1.65fr;gap:clamp(2rem,5vw,4.5rem);align-items:start}
@media(max-width:768px){.bio-grid{grid-template-columns:1fr}}
.bio-photo-wrap{position:relative;border-radius:var(--r3);overflow:hidden;aspect-ratio:3/4}
.bio-photo-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.bio-photo-wrap:hover img{transform:scale(1.04)}
.bio-photo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(var(--pur),.3) 0%,transparent 55%);pointer-events:none}
.bio-photo-accent{position:absolute;left:0;top:18%;bottom:18%;width:3px;background:linear-gradient(180deg,transparent 0%,var(--pu) 35%,var(--cy) 70%,transparent 100%);border-radius:999px;z-index:2}
.bio-placeholder{height:100%;background:linear-gradient(135deg,rgba(var(--pur),.12),rgba(143,0,255,.08));display:flex;align-items:center;justify-content:center}
.bio-placeholder span{font-family:var(--d);font-size:5rem;opacity:.2}
.bio-highlights{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:2rem}
.highlight{background:rgba(var(--pur),.05);border:1px solid rgba(var(--pur),.16);border-radius:var(--r2);padding:1rem 1.1rem;transition:background .2s,border-color .2s}
.highlight:hover{background:rgba(var(--pur),.1);border-color:rgba(var(--pur),.32)}
.hl-num{font-family:var(--d);font-size:2rem;background:linear-gradient(135deg,var(--pu),var(--pu2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.2rem}
.hl-label{font-family:var(--m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.bio-tabs{display:flex;gap:.45rem;margin-bottom:1.5rem}
.bio-tab{font-family:var(--m);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:.38rem 1rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);transition:all .2s;cursor:pointer}
.bio-tab.active{background:var(--pu);border-color:var(--pu);color:#fff}
.bio-lede{font-family:var(--h);font-size:clamp(1.05rem,2.2vw,1.3rem);font-weight:500;color:var(--pu);line-height:1.55;margin-bottom:1.5rem;letter-spacing:.01em;padding-left:1.1rem;border-left:3px solid rgba(var(--pur),.5)}
.bio-body{color:var(--text2);line-height:1.88;font-size:.9rem}
.bio-body p{margin-bottom:1rem}
.bio-content{display:none}
.bio-content.active{display:block}

/* MUSIC */
#music{background:var(--bg)}
.music-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,480px),1fr));gap:1.5rem}
.music-card{background:linear-gradient(135deg,rgba(var(--pur),.07) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(var(--pur),.2);border-radius:var(--r2);overflow:hidden;transition:border-color .3s,box-shadow .3s;position:relative}
.music-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pu) 0%,var(--pu2) 60%,transparent 100%);z-index:1}
.music-card:hover{border-color:rgba(var(--pur),.42);box-shadow:0 8px 44px rgba(var(--pur),.12)}
.music-card-header{padding:1.4rem 1.5rem 1rem;display:flex;align-items:center;gap:1rem}
.music-icon{width:44px;height:44px;background:linear-gradient(135deg,rgba(var(--pur),.18),rgba(139,0,255,.12));border:1px solid rgba(var(--pur),.28);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.music-meta{flex:1;min-width:0}
.music-title{font-family:var(--h);font-size:1.05rem;font-weight:600;letter-spacing:.02em;color:var(--text);margin-bottom:.45rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-badges{display:flex;gap:.4rem;flex-wrap:wrap}
.music-platform{font-family:var(--m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:.2rem .65rem;border-radius:999px;background:rgba(var(--pur),.1);border:1px solid rgba(var(--pur),.25);color:var(--pu)}
.music-type-badge{font-family:var(--m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:.2rem .65rem;border-radius:999px;background:rgba(var(--cyr),.07);border:1px solid rgba(var(--cyr),.2);color:var(--cy)}
.music-embed{padding:0 .75rem .75rem}
.music-embed iframe{border-radius:10px;width:100%;height:166px;border:none;display:block}

/* GALLERY */
#gallery{background:var(--bg2)}
.gallery-filters{display:flex;gap:.55rem;margin-bottom:2rem;flex-wrap:wrap}
.filter-btn{font-family:var(--m);font-size:.63rem;letter-spacing:.14em;text-transform:uppercase;padding:.38rem 1rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);transition:all .22s;cursor:pointer}
.filter-btn.active{background:var(--pu);border-color:var(--pu);color:#fff;box-shadow:0 0 18px rgba(var(--pur),.3)}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:300px;gap:1rem}
@media(max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:240px}}
@media(max-width:500px){.gallery-grid{grid-template-columns:1fr;grid-auto-rows:320px}}
.gallery-item{border-radius:var(--r2);overflow:hidden;position:relative;cursor:pointer;background:var(--bg3)}
.gallery-item.feat{grid-column:span 2;grid-row:span 2}
.gallery-item.tall{grid-row:span 2}
.gallery-item.wide{grid-column:span 2}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.gallery-item:hover img{transform:scale(1.06)}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,15,.88) 0%,rgba(var(--pur),.08) 50%,transparent 100%);opacity:0;transition:opacity .35s}
.gallery-item:hover .gallery-item-overlay{opacity:1}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:1.1rem;font-family:var(--h);font-size:.9rem;font-weight:600;letter-spacing:.04em;transform:translateY(6px);opacity:0;transition:transform .35s ease,opacity .35s ease}
.gallery-item:hover .gallery-caption{transform:translateY(0);opacity:1}
.gallery-placeholder{background:rgba(255,255,255,.03);border:1px dashed var(--faint);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;border-radius:var(--r2);height:100%}
.gallery-placeholder span{font-family:var(--m);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}

/* SHOWS */
#shows{background:var(--bg)}
.shows-empty-card{border-radius:var(--r3);padding:3.5rem 2.5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;text-align:center;border:1px solid rgba(var(--pur),.2);background:linear-gradient(135deg,rgba(var(--pur),.06),rgba(139,0,255,.03));position:relative;overflow:hidden}
.shows-empty-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 110%,rgba(var(--pur),.1) 0%,transparent 65%);pointer-events:none}
.shows-empty-icon{width:58px;height:58px;border-radius:50%;background:rgba(var(--pur),.08);border:1px solid rgba(var(--pur),.25);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.shows-empty-text{font-family:var(--h);font-size:1.15rem;font-weight:400;color:var(--text2);letter-spacing:.04em}
.shows-list{display:flex;flex-direction:column;gap:1rem}
.show-card{display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:center;background:rgba(255,255,255,.02);border:1px solid var(--faint);border-radius:var(--r2);padding:1.5rem 2rem;transition:border-color .22s,background .22s}
.show-card:hover{border-color:rgba(var(--pur),.35);background:rgba(var(--pur),.04)}
@media(max-width:600px){.show-card{grid-template-columns:1fr;gap:.8rem}}
.show-date{font-family:var(--d);font-size:2.2rem;color:var(--pu);line-height:1;min-width:60px;text-align:center}
.show-date-sub{font-family:var(--m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);text-align:center;margin-top:.2rem}
.show-info-venue{font-family:var(--h);font-size:1.15rem;font-weight:600;margin-bottom:.25rem;letter-spacing:.02em}
.show-info-location{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;color:var(--text2)}
.show-badge{font-family:var(--m);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .85rem;border-radius:999px;border:1px solid rgba(var(--pur),.35);color:var(--pu)}

/* PRESS KIT */
#presskit{background:var(--bg2)}
.presskit-desc{color:var(--text2);margin-bottom:2rem;max-width:600px;line-height:1.8;font-size:.9rem}
.presskit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.pk-item{background:rgba(255,255,255,.02);border:1px solid var(--faint);border-radius:var(--r3);padding:2rem 1.75rem;display:flex;flex-direction:column;gap:1rem;transition:border-color .25s,background .25s,transform .25s;position:relative;overflow:hidden}
.pk-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pu),var(--pu2),transparent);opacity:0;transition:opacity .25s;z-index:1}
.pk-item:hover{border-color:rgba(var(--pur),.38);background:rgba(var(--pur),.06);transform:translateY(-3px)}
.pk-item:hover::before{opacity:1}
.pk-icon{font-size:2.2rem;line-height:1}
.pk-name{font-family:var(--h);font-size:1.1rem;font-weight:700;letter-spacing:.03em}
.pk-meta{font-family:var(--m);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.pk-link{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--m);font-size:.68rem;letter-spacing:.1em;color:var(--pu);border:1px solid rgba(var(--pur),.3);padding:.45rem 1rem;border-radius:999px;transition:all .2s;margin-top:auto;width:fit-content}
.pk-link:hover{background:rgba(var(--pur),.1);border-color:var(--pu)}

/* FOOTER */
footer{background:var(--bg);border-top:1px solid rgba(var(--pur),.1);padding:clamp(3rem,6vw,5rem) var(--gap) 2rem}
.footer-inner{max-width:var(--max);margin:0 auto}
.footer-top{display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;margin-bottom:3rem}
@media(max-width:600px){.footer-top{grid-template-columns:1fr}}
.footer-name{font-family:var(--d);font-size:clamp(2.5rem,8vw,5rem);line-height:.9;background:linear-gradient(135deg,#fff,var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.footer-contact{display:flex;flex-direction:column;gap:.6rem;text-align:right}
@media(max-width:600px){.footer-contact{text-align:left}}
.contact-label{font-family:var(--m);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text2)}
.contact-value{font-family:var(--h);font-size:1rem;font-weight:600;color:var(--pu);transition:color .2s}
.contact-value:hover{color:var(--cy)}
.social-row{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:3rem}
.social-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--m);font-size:.63rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text2);padding:.5rem 1.1rem;border:1px solid var(--faint);border-radius:999px;transition:all .22s}
.social-link:hover{color:var(--pu);border-color:rgba(var(--pur),.4);background:rgba(var(--pur),.06)}
.social-icon{font-style:normal;font-family:var(--m);font-size:.6rem;letter-spacing:.1em;opacity:.7}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;border-top:1px solid rgba(var(--pur),.08);flex-wrap:wrap;gap:1rem}
.footer-copy{font-family:var(--m);font-size:.58rem;letter-spacing:.1em;color:var(--faint)}
.footer-brand{display:flex;align-items:center;gap:.55rem;opacity:.45;transition:opacity .25s}
.footer-brand:hover{opacity:1}
.footer-brand-text{font-family:var(--m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.footer-brand img{height:18px;width:auto}

/* ADMIN OVERLAY */
#admOv{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);overflow-y:auto;padding:2rem var(--gap)}
#admOv.open{display:flex;align-items:flex-start;justify-content:center}
.adm-panel{background:var(--bg2);border:1px solid rgba(var(--pur),.3);border-radius:var(--r3);width:100%;max-width:800px;overflow:hidden}
.adm-header{padding:1.5rem 2rem;border-bottom:1px solid var(--faint);display:flex;align-items:center;justify-content:space-between}
.adm-title{font-family:var(--d);font-size:1.5rem;letter-spacing:.08em}
.adm-close{font-size:1.5rem;color:var(--text2);transition:color .2s}
.adm-close:hover{color:var(--pu)}
.adm-body{padding:2rem}
#admLogin{display:flex;flex-direction:column;gap:1rem}
#admLogin input{background:rgba(255,255,255,.05);border:1px solid var(--faint);border-radius:var(--r);padding:.8rem 1rem;color:var(--text);font-family:var(--s);font-size:.95rem;outline:none;transition:border-color .2s}
#admLogin input:focus{border-color:var(--pu)}
.adm-save-btn{padding:.8rem 2rem;background:linear-gradient(135deg,var(--pu),var(--pu2));color:#fff;font-family:var(--h);font-size:.95rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:var(--r);transition:transform .2s,box-shadow .2s}
.adm-save-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(var(--pur),.4)}
.adm-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:2rem}
.adm-tab{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .9rem;border:1px solid var(--faint);border-radius:999px;color:var(--text2);cursor:pointer;transition:all .2s}
.adm-tab.active{background:var(--pu);border-color:var(--pu);color:#fff}
.adm-field{margin-bottom:1.2rem}
.adm-label{font-family:var(--m);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:.4rem;display:block}
.adm-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--faint);border-radius:var(--r);padding:.7rem 1rem;color:var(--text);font-family:var(--s);font-size:.9rem;outline:none;transition:border-color .2s}
.adm-input:focus{border-color:var(--pu)}
.adm-textarea{resize:vertical;min-height:100px}
.adm-content{display:none}
.adm-content.active{display:block}

/* TOAST */
#toast{position:fixed;bottom:2rem;right:2rem;background:var(--pu);color:#fff;font-family:var(--h);font-size:.9rem;font-weight:600;padding:.8rem 1.5rem;border-radius:var(--r);opacity:0;transform:translateY(1rem);transition:all .3s;pointer-events:none;z-index:300}
#toast.show{opacity:1;transform:translateY(0)}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:var(--r)}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;font-size:2rem;color:var(--text2);cursor:pointer;transition:color .2s}
.lb-close:hover{color:var(--pu)}
</style>

<script>
const SLUG = 'yemix';

let _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFicGp1dWVzZ3Nyb3RzYWdvcmNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDc1ODksImV4cCI6MjA5NjE4MzU4OX0.CWCOb23nuq0JkHNAJT3CTLWtfT7cLBYdOKOjRZqVZLc';
let _sb = null;

const DL = {
  load() {
    try { const d = localStorage.getItem('epk_'+SLUG+'_v2'); return d ? JSON.parse(d) : null; } catch(e){ return null; }
  },
  save(d) {
    const ts = new Date().toISOString();
    try {
      localStorage.setItem('epk_'+SLUG+'_v2', JSON.stringify(d));
      localStorage.setItem('epk_'+SLUG+'_ts', ts);
    } catch(e){}
    if(_sb) { _sb.from('epk').upsert({slug:SLUG,data:d,updated_at:ts},{onConflict:'slug'}).then(()=>{}); }
  },
  sync() {
    if(!_sb) return;
    const localTs = localStorage.getItem('epk_'+SLUG+'_ts') || '0';
    _sb.from('epk').select('data,updated_at').eq('slug',SLUG).single().then(({data})=>{
      if(data && data.updated_at > localTs) {
        EPK = data.data;
        localStorage.setItem('epk_'+SLUG+'_v2', JSON.stringify(EPK));
        localStorage.setItem('epk_'+SLUG+'_ts', data.updated_at);
        renderAll();
      }
    });
  }
};

function init() {
  const embedded = JSON.parse(document.getElementById('epk-data').textContent);
  const stored = DL.load();
  EPK = stored || embedded;
  renderAll();
  setTimeout(()=>{ document.getElementById('loader').classList.add('out'); }, 600);
  (function(){
    if(_SB_URL.includes('%%')) return;
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.async = true;
    s.onload = function(){
      _sb = supabase.createClient(_SB_URL, _SB_KEY);
      _sb.from('epk_views').insert({slug:SLUG}).then(()=>{});
      DL.sync();
    };
    document.head.appendChild(s);
  })();
}

function renderHero() {

  const genres = (a.genres||[]).map(g=>`<span class="genre-tag">${g}</span>`).join('');
  const heroBgStyle = a.heroPhoto ? ` style="background-image:url('${a.heroPhoto}');background-size:cover;background-position:center top"` : '';
  return `
<section id="hero">
  <div class="hero-bg"${heroBgStyle}></div>

  <div class="hero-location">${a.location}</div>
  <div class="hero-content">

    </div>
  </div>
</section>`;
}

function renderBio() {

  }
  const hasPhoto = a.bioPhoto && !a.bioPhoto.includes('{project}');
  const photoHTML = hasPhoto
    ? `<img src="${a.bioPhoto}" alt="${a.name}" loading="lazy">`
    : `<div class="bio-placeholder"><span>Y</span></div>`;
  return `

  <div class="section-inner">
    <div class="bio-grid">

        <div class="bio-photo-wrap">

      </div>

        <div class="section-label">Acerca de</div>
        <h2 class="section-title">${a.name}</h2>

        <div class="bio-content active" data-content="es">${bioHTML('es')}</div>
        <div class="bio-content" data-content="en">${bioHTML('en')}</div>
        <div class="bio-content" data-content="pt">${bioHTML('pt')}</div>
      </div>
    </div>
  </div>
</section>`;
}

function renderGallery() {
  const items = (EPK.gallery||[]).map(g=>{

  return `

function bindBioTabs() {
  document.querySelectorAll('.bio-tab').forEach(tab=>{
    tab.addEventListener('click',function(){
      document.querySelectorAll('.bio-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.bio-content').forEach(c=>c.classList.remove('active'));
      this.classList.add('active');
      document.querySelector('.bio-content[data-content="'+this.dataset.lang+'"]').classList.add('active');
    });
  });
}

function filterGallery(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.gallery-item').forEach(item=>{
    item.style.display = (cat==='all' || item.dataset.cat===cat) ? '' : 'none';

}

  if(!confirm('Restaurar datos originales?')) return;
  localStorage.removeItem('epk_'+SLUG+'_v2');
  localStorage.removeItem('epk_'+SLUG+'_ts');
  EPK = JSON.parse(document.getElementById('epk-data').textContent);
  renderAll();
  loadAdmFields();
  showToast('↩ Restaurado');
}

function admExport() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'yemix-epk.html';
  a.click();
  showToast('↓ Exportado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
